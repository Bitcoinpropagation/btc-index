<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比特币定投指数 - BTC DCA Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .pulse-dot {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold mb-2">比特币定投指数</h1>
            <p class="text-gray-400">基于 200 日定投成本和指数增长估值的定投策略工具</p>
        </header>

        <!-- Live Price Display -->
        <div class="glass rounded-xl p-6 mb-8">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
                        </svg>
                    </div>
                    <div>
                        <div class="text-sm text-gray-400">比特币实时价格</div>
                        <div class="flex items-center gap-2">
                            <span id="livePrice" class="text-2xl font-bold">$--</span>
                            <span class="pulse-dot w-2 h-2 bg-green-400 rounded-full"></span>
                            <span class="text-xs text-gray-500">每30秒更新</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-center">
                        <div class="text-sm text-gray-400">24h 涨跌幅</div>
                        <span id="priceChange">--</span>
                    </div>
                    <div class="text-center">
                        <div class="text-sm text-gray-400">数据来源</div>
                        <span class="text-sm text-gray-300">CoinGecko / Binance</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Current Index Display -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="glass rounded-xl p-6 text-center">
                <div class="text-gray-400 text-sm mb-2">当前指数</div>
                <div id="currentIndex" class="text-4xl font-bold">--</div>
                <div id="indexStatus" class="text-sm mt-2">--</div>
            </div>
            <div class="glass rounded-xl p-6 text-center">
                <div class="text-gray-400 text-sm mb-2">比特币价格</div>
                <div id="btcPrice" class="text-2xl font-bold">$--</div>
            </div>
            <div class="glass rounded-xl p-6 text-center">
                <div class="text-gray-400 text-sm mb-2">200日定投成本</div>
                <div id="avgCost" class="text-2xl font-bold">$--</div>
            </div>
            <div class="glass rounded-xl p-6 text-center">
                <div class="text-gray-400 text-sm mb-2">投资建议</div>
                <div id="suggestion" class="text-lg font-bold">--</div>
            </div>
        </div>

        <!-- Chart -->
        <div class="glass rounded-xl p-4 mb-8">
            <div id="chart" class="w-full h-96"></div>
        </div>

        <!-- Index Zones -->
        <div class="glass rounded-xl p-6 mb-8">
            <h2 class="text-xl font-bold mb-4">定投指数区间说明</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-green-900/50 rounded-lg p-4 text-center border border-green-500/30">
                    <div class="text-2xl font-bold text-green-400">&lt; 0.45</div>
                    <div class="text-sm text-gray-300">抄底区间</div>
                    <div class="text-xs text-gray-500 mt-1">大胆买入</div>
                </div>
                <div class="bg-blue-900/50 rounded-lg p-4 text-center border border-blue-500/30">
                    <div class="text-2xl font-bold text-blue-400">0.45 - 1.2</div>
                    <div class="text-sm text-gray-300">定投区间</div>
                    <div class="text-xs text-gray-500 mt-1">坚持定投</div>
                </div>
                <div class="bg-yellow-900/50 rounded-lg p-4 text-center border border-yellow-500/30">
                    <div class="text-2xl font-bold text-yellow-400">1.2 - 5</div>
                    <div class="text-sm text-gray-300">观望区间</div>
                    <div class="text-xs text-gray-500 mt-1">停止定投</div>
                </div>
                <div class="bg-red-900/50 rounded-lg p-4 text-center border border-red-500/30">
                    <div class="text-2xl font-bold text-red-400">&gt; 5</div>
                    <div class="text-sm text-gray-300">可能见顶</div>
                    <div class="text-xs text-gray-500 mt-1">考虑卖出</div>
                </div>
            </div>
        </div>

        <!-- Ads Section -->
        <div class="mb-8">
            <h2 class="text-xl font-bold mb-4 text-center">推荐交易平台</h2>
            <div id="adsContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- 广告卡片将由 JavaScript 动态生成 -->
                <div class="glass rounded-xl p-6 text-center">
                    <div class="animate-pulse">
                        <div class="w-12 h-12 bg-gray-600 rounded-full mx-auto mb-3"></div>
                        <div class="h-4 bg-gray-600 rounded w-3/4 mx-auto mb-2"></div>
                        <div class="h-3 bg-gray-600 rounded w-1/2 mx-auto"></div>
                    </div>
                </div>
                <div class="glass rounded-xl p-6 text-center">
                    <div class="animate-pulse">
                        <div class="w-12 h-12 bg-gray-600 rounded-full mx-auto mb-3"></div>
                        <div class="h-4 bg-gray-600 rounded w-3/4 mx-auto mb-2"></div>
                        <div class="h-3 bg-gray-600 rounded w-1/2 mx-auto"></div>
                    </div>
                </div>
                <div class="glass rounded-xl p-6 text-center">
                    <div class="animate-pulse">
                        <div class="w-12 h-12 bg-gray-600 rounded-full mx-auto mb-3"></div>
                        <div class="h-4 bg-gray-600 rounded w-3/4 mx-auto mb-2"></div>
                        <div class="h-3 bg-gray-600 rounded w-1/2 mx-auto"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Disclaimer -->
        <div class="glass rounded-xl p-6 text-center">
            <p class="text-xs text-gray-500">
                数据来源：CoinGecko API | 仅供参考，不构成投资建议 | 
                <a href="https://github.com/Bitcoinpropagation/btc-index" target="_blank" class="text-blue-400 hover:underline">GitHub</a>
            </p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
