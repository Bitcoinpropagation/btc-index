<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比特币定投指数 - BTC DCA Index</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>₿</text></svg>">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="比特币定投指数工具，基于ahr999指数和200日定投成本，提供科学的定投策略建议">
    <meta name="keywords" content="比特币,定投,ahr999指数,BTC,定投策略,比特币价格">
    <meta name="author" content="Bitcoin Propagation">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bitcoinpropagation.github.io/btc-index/">
    <meta property="og:title" content="比特币定投指数 - BTC DCA Index">
    <meta property="og:description" content="基于200日定投成本的比特币定投策略工具，提供ahr999指数分析和投资建议">
    <meta property="og:image" content="https://bitcoinpropagation.github.io/btc-index/og-image.png">
    
    <!-- Twitter Card -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://bitcoinpropagation.github.io/btc-index/">
    <meta property="twitter:title" content="比特币定投指数">
    <meta property="twitter:description" content="基于200日定投成本的比特币定投策略工具">
    <meta property="twitter:image" content="https://bitcoinpropagation.github.io/btc-index/og-image.png">
    
    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://api.coingecko.com">
    <link rel="preconnect" href="https://i.imgur.com">
    <link rel="preconnect" href="https://unpkg.com">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .pulse-dot {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        /* Mobile Optimizations */
        @media (max-width: 640px) {
            .chart-container {
                height: 250px !important;
            }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold mb-2">比特币定投指数</h1>
            <p class="text-gray-400">基于 200 日定投成本和指数增长估值的定投策略工具</p>
        </header>

        <!-- Live Price Display -->
        <div class="glass rounded-xl p-6 mb-8">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
                        </svg>
                    </div>
                    <div>
                        <div class="text-sm text-gray-400">比特币实时价格</div>
                        <div class="flex items-center gap-2">
                            <span id="livePrice" class="text-2xl font-bold">$--</span>
                            <span class="pulse-dot w-2 h-2 bg-green-400 rounded-full"></span>
                            <span class="text-xs text-gray-500">每30秒更新</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-center">
                        <div class="text-sm text-gray-400">24h 涨跌幅</div>
                        <span id="priceChange">--</span>
                    </div>
                    <div class="text-center">
                        <div class="text-sm text-gray-400">数据来源</div>
                        <span class="text-sm text-gray-300">CoinGecko / Binance</span>
                    </div>
                </div>
            </div>
            <!-- Last Update Time -->
            <div class="mt-4 pt-4 border-t border-white/10 flex justify-between items-center">
                <span class="text-xs text-gray-500">最后更新: <span id="lastUpdate">--</span></span>
                <button onclick="window.location.reload()" class="text-xs text-blue-400 hover:text-blue-300 transition-colors">
                    🔄 刷新数据
                </button>
            </div>
        </div>

        <!-- Current Index Display -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass rounded-xl p-4 md:p-6 text-center">
                <div class="text-gray-400 text-sm mb-2">当前指数</div>
                <div id="currentIndex" class="text-3xl md:text-4xl font-bold">--</div>
                <div id="indexStatus" class="text-sm mt-2">--</div>
            </div>
            <div class="glass rounded-xl p-4 md:p-6 text-center">
                <div class="text-gray-400 text-sm mb-2">比特币价格</div>
                <div id="btcPrice" class="text-xl md:text-2xl font-bold">$--</div>
            </div>
            <div class="glass rounded-xl p-4 md:p-6 text-center">
                <div class="text-gray-400 text-sm mb-2">200日定投成本</div>
                <div id="avgCost" class="text-xl md:text-2xl font-bold">$--</div>
            </div>
            <div class="glass rounded-xl p-4 md:p-6 text-center">
                <div class="text-gray-400 text-sm mb-2">投资建议</div>
                <div id="suggestion" class="text-base md:text-lg font-bold">--</div>
            </div>
        </div>

        <!-- Chart with Time Range Selector -->
        <div class="glass rounded-xl p-4 mb-8">
            <div class="flex flex-wrap justify-between items-center mb-4 gap-2">
                <h2 class="text-lg font-bold">历史走势</h2>
                <div class="flex gap-2">
                    <button onclick="app.setTimeRange('7d')" class="time-range-btn px-3 py-1 text-sm rounded bg-white/10 hover:bg-white/20 transition-colors" data-range="7d">7天</button>
                    <button onclick="app.setTimeRange('30d')" class="time-range-btn px-3 py-1 text-sm rounded bg-white/10 hover:bg-white/20 transition-colors" data-range="30d">30天</button>
                    <button onclick="app.setTimeRange('90d')" class="time-range-btn px-3 py-1 text-sm rounded bg-white/10 hover:bg-white/20 transition-colors" data-range="90d">90天</button>
                    <button onclick="app.setTimeRange('1y')" class="time-range-btn px-3 py-1 text-sm rounded bg-blue-500/30 hover:bg-blue-500/40 transition-colors" data-range="1y">1年</button>
                    <button onclick="app.setTimeRange('all')" class="time-range-btn px-3 py-1 text-sm rounded bg-white/10 hover:bg-white/20 transition-colors" data-range="all">全部</button>
                </div>
            </div>
            <div id="chart" class="w-full h-64 md:h-96 chart-container"></div>
            <div id="chartError" class="hidden text-center text-red-400 py-8">
                <p>图表加载失败，请刷新页面重试</p>
            </div>
        </div>

        <!-- Index Zones -->
        <div class="glass rounded-xl p-6 mb-8">
            <h2 class="text-xl font-bold mb-4">定投指数区间说明</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-green-900/50 rounded-lg p-4 text-center border border-green-500/30">
                    <div class="text-2xl font-bold text-green-400">&lt; 0.45</div>
                    <div class="text-sm text-gray-300">抄底区间</div>
                    <div class="text-xs text-gray-500 mt-1">大胆买入</div>
                </div>
                <div class="bg-blue-900/50 rounded-lg p-4 text-center border border-blue-500/30">
                    <div class="text-2xl font-bold text-blue-400">0.45 - 1.2</div>
                    <div class="text-sm text-gray-300">定投区间</div>
                    <div class="text-xs text-gray-500 mt-1">坚持定投</div>
                </div>
                <div class="bg-yellow-900/50 rounded-lg p-4 text-center border border-yellow-500/30">
                    <div class="text-2xl font-bold text-yellow-400">1.2 - 5</div>
                    <div class="text-sm text-gray-300">观望区间</div>
                    <div class="text-xs text-gray-500 mt-1">停止定投</div>
                </div>
                <div class="bg-red-900/50 rounded-lg p-4 text-center border border-red-500/30">
                    <div class="text-2xl font-bold text-red-400">&gt; 5</div>
                    <div class="text-sm text-gray-300">可能见顶</div>
                    <div class="text-xs text-gray-500 mt-1">考虑卖出</div>
                </div>
            </div>
        </div>

        <!-- Ads Section -->
        <div class="mb-8">
            <h2 class="text-xl font-bold mb-4 text-center">推荐交易平台</h2>
            <div id="adsContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- 广告卡片将由 JavaScript 动态生成 -->
                <div class="glass rounded-xl p-6 text-center">
                    <div class="animate-pulse">
                        <div class="w-12 h-12 bg-gray-600 rounded-full mx-auto mb-3"></div>
                        <div class="h-4 bg-gray-600 rounded w-3/4 mx-auto mb-2"></div>
                        <div class="h-3 bg-gray-600 rounded w-1/2 mx-auto"></div>
                    </div>
                </div>
                <div class="glass rounded-xl p-6 text-center">
                    <div class="animate-pulse">
                        <div class="w-12 h-12 bg-gray-600 rounded-full mx-auto mb-3"></div>
                        <div class="h-4 bg-gray-600 rounded w-3/4 mx-auto mb-2"></div>
                        <div class="h-3 bg-gray-600 rounded w-1/2 mx-auto"></div>
                    </div>
                </div>
                <div class="glass rounded-xl p-6 text-center">
                    <div class="animate-pulse">
                        <div class="w-12 h-12 bg-gray-600 rounded-full mx-auto mb-3"></div>
                        <div class="h-4 bg-gray-600 rounded w-3/4 mx-auto mb-2"></div>
                        <div class="h-3 bg-gray-600 rounded w-1/2 mx-auto"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Disclaimer -->
        <div class="glass rounded-xl p-6 text-center">
            <p class="text-xs text-gray-500">
                数据来源：CoinGecko API | 仅供参考，不构成投资建议 | 
                <a href="https://github.com/Bitcoinpropagation/btc-index" target="_blank" class="text-blue-400 hover:underline">GitHub</a>
            </p>
        </div>
    </div>

    <!-- Structured Data for SEO -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "比特币定投指数",
        "description": "基于200日定投成本的比特币定投策略工具，提供ahr999指数分析和投资建议",
        "url": "https://bitcoinpropagation.github.io/btc-index/",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Any",
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
        }
    }
    </script>

    <script src="app.js"></script>
</body>
</html>
